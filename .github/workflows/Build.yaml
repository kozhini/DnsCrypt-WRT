name: Build OpenWrt Package

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt version"
        required: true
        default: "24.10.6"
      target:
        description: "Target"
        required: true
        default: "mediatek"
      subtarget:
        description: "Subtarget"
        required: true
        default: "filogic"
      arch:
        description: "Architecture"
        required: true
        default: "aarch64_cortex-a53"
      go_version:
        description: "Go version"
        required: true
        default: "1.25.5"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      OPENWRT_VERSION: ${{ inputs.openwrt_version }}
      TARGET: ${{ inputs.target }}
      SUBTARGET: ${{ inputs.subtarget }}
      ARCH: ${{ inputs.arch }}
      GO_VERSION: ${{ inputs.go_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read package version
        id: pkg_version
        run: |
          VERSION=$(grep '^PKG_VERSION:=' Makefile | cut -d= -f2)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
           go-version: 1
           check-latest: true
           cache: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget zstd

      - name: Download OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/${SUBTARGET}/openwrt-sdk-${OPENWRT_VERSION}-${TARGET}-${SUBTARGET}_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -q "$SDK_URL" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk

      - name: Update feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package to SDK
        run: |
          mkdir -p openwrt-sdk/package/dnscrypt-proxy2
          cp Makefile openwrt-sdk/package/dnscrypt-proxy2/
          [ -d files ] && cp -r files openwrt-sdk/package/dnscrypt-proxy2/ || true

      - name: Configure package
        working-directory: openwrt-sdk
        run: |
          echo "CONFIG_PACKAGE_dnscrypt-proxy2=m" > .config
          make defconfig

      - name: Compile package
        working-directory: openwrt-sdk
        env:
          GOTOOLCHAIN: local
          SOURCE_DATE_EPOCH: 1700000000
        run: |
          make package/dnscrypt-proxy2/clean V=s
          make package/dnscrypt-proxy2/compile V=s -j"$(nproc)"

      - name: Find built packages
        run: |
          find openwrt-sdk/bin/packages -type f -name "*.ipk" -ls

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: dnscrypt-proxy2-${{ env.OPENWRT_VERSION }}-${{ env.ARCH }}
          path: |
            openwrt-sdk/bin/packages/**/dnscrypt-proxy2*.ipk
          if-no-files-found: error

      - name: Prepare release files
        id: prepare_release
        run: |
          mkdir -p release
          find openwrt-sdk/bin/packages -name "dnscrypt-proxy2*.ipk" -exec cp {} release/ \;
          TAG="openwrt-${OPENWRT_VERSION}-${{ steps.pkg_version.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare_release.outputs.tag }}
          name: OpenWrt ${{ inputs.openwrt_version }} - dnscrypt-proxy2 ${{ steps.pkg_version.outputs.version }}
          body: |
            dnscrypt-proxy2 for OpenWrt ${{ inputs.openwrt_version }}
            Architecture: ${{ inputs.arch }}
            Go: ${{ inputs.go_version }}
          files: release/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
