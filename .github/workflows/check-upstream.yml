name: Check Upstream Release

on:
  schedule:
    - cron: '0 9 * * 1'  # каждый понедельник в 09:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest upstream version
        id: upstream
        run: |
          LATEST=$(curl -sSf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/DNSCrypt/dnscrypt-proxy/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=${LATEST}" >> $GITHUB_OUTPUT
          echo "Upstream latest: ${LATEST}"

      - name: Check if already built
        id: check_tag
        env:
          VERSION: ${{ steps.upstream.outputs.version }}
          OPENWRT_VERSION: "24.10.6"
        run: |
          TAG="openwrt${OPENWRT_VERSION}-${VERSION}"
          echo "Checking tag: ${TAG}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Tag ${TAG} already exists, skipping build"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Tag ${TAG} not found, build needed"
          fi

      - name: Update Makefile
        if: steps.check_tag.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" Makefile
          sed -i "s/^PKG_SOURCE_VERSION:=.*/PKG_SOURCE_VERSION:=${VERSION}/" Makefile
          echo "=== Verify ==="
          grep -E "^PKG_VERSION|^PKG_SOURCE_VERSION" Makefile

      - name: Commit updated Makefile
        if: steps.check_tag.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Makefile
          if git diff --cached --quiet; then
            echo "Makefile already up to date, skipping commit"
          else
            git commit -m "chore: bump dnscrypt-proxy2 to ${VERSION}"
            git push
          fi

      - name: Trigger build
        if: steps.check_tag.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.upstream.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run Build.yaml \
            -f openwrt_version=24.10.6 \
            -f target=mediatek \
            -f subtarget=filogic \
            -f arch=aarch64_cortex-a53 \
            -f go_version=1.25.5
